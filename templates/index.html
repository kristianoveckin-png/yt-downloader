<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Downloader Pro</title>
    <link rel="shortcut icon" href="/favicon.ico" type="image/png">
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box;
            transition: all 0.5s ease;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: #fff;
        }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        .container { 
            text-align: center; 
            background: rgba(0, 0, 0, 0.4); 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px);
            padding: 40px; 
            border-radius: 30px; 
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 50px rgba(0,0,0,0.3); 
            width: 100%; max-width: 600px; 
            transition: all 0.3s; box-sizing: border-box; 
            animation: fadeInUp 0.8s ease-out;
        }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        h1 { color: #fff; margin-bottom: 20px; font-size: clamp(24px, 5vw, 32px); font-weight: 800; }
        .counter { font-size: 14px; color: rgba(255,255,255,0.7); margin-bottom: 10px; display: block; }
        .count-num { color: #ff4d4d; font-weight: bold; }
        input { 
            width: 100%; max-width: 400px; padding: 15px; border: 2px solid rgba(255,255,255,0.1); 
            border-radius: 15px; font-size: 16px; margin-bottom: 20px; outline: none; 
            transition: 0.3s; background: rgba(0,0,0,0.2); color: #fff; 
            box-sizing: border-box; 
        }
        input:focus { border-color: #ff4d4d; transform: scale(1.02); background: rgba(0,0,0,0.3); }
        button { 
            padding: 15px 30px; background: #ff4d4d; color: white; 
            border: none; border-radius: 15px; cursor: pointer; font-size: 18px; 
            font-weight: bold; transition: all 0.3s; min-width: 200px;
            box-shadow: 0 10px 20px rgba(255, 0, 0, 0.3);
        }
        button:hover { background: #ff3333; transform: translateY(-3px) scale(1.05); box-shadow: 0 15px 25px rgba(255, 0, 0, 0.4); }
        #loader-container { display: none; margin: 20px auto; text-align: center; }
        .spinner { border: 4px solid rgba(255,255,255,0.1); border-top: 4px solid #ff4d4d; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto 10px; }
        .progress-bar { width: 100%; background: rgba(0,0,0,0.2); height: 12px; border-radius: 10px; overflow: hidden; margin-top: 10px; position: relative; }
        .progress-fill { width: 0%; height: 100%; background: #ff4d4d; transition: width 0.2s; box-shadow: 0 0 10px #ff4d4d; }
        #progress-text { font-size: 14px; color: #fff; margin-top: 5px; display: block; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .platforms-section { margin-top: 30px; text-align: left; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 20px; }
        .platforms-section p { font-weight: bold; color: #fff; margin-bottom: 15px; text-align: center; }
        .category { margin-bottom: 15px; }
        .category-title { font-size: 11px; color: rgba(255,255,255,0.5); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 10px; display: block; text-align: center; }
        .tags { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
        .tag { background: rgba(255,255,255,0.1); color: #eee; padding: 6px 12px; border-radius: 10px; font-size: 13px; border: 1px solid rgba(255,255,255,0.1); transition: 0.3s; }
        .tag:hover { background: #ff4d4d; color: white; transform: translateY(-3px); }
    </style>
</head>
<body>
    <div class="container">
        <span class="counter">Скачано видео: <span id="count-num" class="count-num">12450</span></span>
        <h1>Скачать видео</h1>
        <form id="downloadForm" action="/analyze" method="post">
            <input type="text" name="url" placeholder="Вставьте ссылку на видео или плейлист..." required>
            <br>
            <button type="submit" id="submitBtn">Проверить качество</button>
        </form>
        <div id="loader-container">
            <div class="spinner"></div>
            <span id="progress-text">Анализ видео: 0%</span>
            <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
        </div>
        <div class="platforms-section">
            <p>Поддерживаемые платформы:</p>
            <div class="category"><span class="category-title">СНГ Сервисы</span><div class="tags"><span class="tag">VK</span><span class="tag">Rutube</span><span class="tag">Дзен</span><span class="tag">OK.ru</span></div></div>
            <div class="category"><span class="category-title">Мировые соцсети</span><div class="tags"><span class="tag">TikTok</span><span class="tag">Instagram</span><span class="tag">Facebook</span><span class="tag">Twitter (X)</span></div></div>
            <div class="category"><span class="category-title">Видеохостинги</span><div class="tags"><span class="tag">Vimeo</span><span class="tag">DailyMotion</span><span class="tag">Twitch</span></div></div>
        </div>
    </div>
    <script>
        const form = document.getElementById('downloadForm');
        const btn = document.getElementById('submitBtn');
        const loaderContainer = document.getElementById('loader-container');
        const progressFill = document.getElementById('progress-fill');
        const progressText = document.getElementById('progress-text');
        form.onsubmit = function() {
            btn.style.display = 'none';
            loaderContainer.style.display = 'block';
            let width = 0;
            const interval = setInterval(() => {
                if (width >= 95) { clearInterval(interval); } 
                else {
                    width += Math.random() * 5;
                    if (width > 95) width = 95;
                    progressFill.style.width = width + '%';
                    progressText.innerText = `Анализ видео: ${Math.round(width)}%`;
                }
            }, 100);
        };
        let count = 12450;
        setInterval(() => {
            count += Math.floor(Math.random() * 3);
            document.getElementById('count-num').innerText = count.toLocaleString();
        }, 3000);
    </script>
</body>
</html>
