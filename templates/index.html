<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Downloader Pro</title>
    <link rel="shortcut icon" href="/favicon.ico" type="image/png">
    <style>
        :root {
            --bg-color: #f0f2f5;
            --container-bg: #ffffff;
            --text-color: #333333;
            --input-border: #ddd;
            --accent-color: #ff0000;
            --accent-hover: #cc0000;
            --platform-bg: #f1f3f5;
            --platform-text: #555;
        }

        [data-theme="dark"] {
            --bg-color: #18191a;
            --container-bg: #242526;
            --text-color: #e4e6eb;
            --input-border: #3a3b3c;
            --accent-color: #ff4d4d;
            --accent-hover: #ff3333;
            --platform-bg: #3a3b3c;
            --platform-text: #b0b3b8;
        }

        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; background-color: var(--bg-color); color: var(--text-color); margin: 0; transition: background 0.3s; padding: 20px; box-sizing: border-box; }
        .theme-switch { position: absolute; top: 20px; right: 20px; cursor: pointer; background: var(--container-bg); border: 2px solid var(--accent-color); padding: 10px; border-radius: 50px; font-size: 20px; transition: 0.3s; z-index: 10; }
        .container { text-align: center; background: var(--container-bg); padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); width: 100%; max-width: 600px; transition: background 0.3s; box-sizing: border-box; }
        h1 { color: var(--text-color); margin-bottom: 20px; font-size: clamp(24px, 5vw, 32px); }
        input { width: 100%; max-width: 400px; padding: 12px; border: 2px solid var(--input-border); border-radius: 10px; font-size: 16px; margin-bottom: 20px; outline: none; transition: border-color 0.3s; background: var(--container-bg); color: var(--text-color); box-sizing: border-box; }
        input:focus { border-color: var(--accent-color); }
        button { padding: 12px 25px; background: var(--accent-color); color: white; border: none; border-radius: 10px; cursor: pointer; font-size: 16px; font-weight: bold; transition: all 0.3s; min-width: 200px; }
        button:hover { background: var(--accent-hover); transform: translateY(-2px); box-shadow: 0 5px 15px rgba(255, 0, 0, 0.3); }
        #loader-container { display: none; margin: 20px auto; text-align: center; }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid var(--accent-color); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto 10px; }
        .progress-bar { width: 100%; background: var(--platform-bg); height: 10px; border-radius: 5px; overflow: hidden; margin-top: 10px; position: relative; }
        .progress-fill { width: 0%; height: 100%; background: var(--accent-color); transition: width 0.2s; }
        #progress-text { font-size: 14px; color: var(--text-color); margin-top: 5px; display: block; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .platforms-section { margin-top: 30px; text-align: left; border-top: 1px solid var(--input-border); padding-top: 20px; }
        .platforms-section p { font-weight: bold; color: var(--text-color); margin-bottom: 10px; text-align: center; }
        .category { margin-bottom: 15px; }
        .category-title { font-size: 12px; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; display: block; }
        .tags { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
        .tag { background: var(--platform-bg); color: var(--platform-text); padding: 4px 10px; border-radius: 6px; font-size: 13px; border: 1px solid var(--input-border); transition: all 0.2s; }
        .tag:hover { background: var(--accent-color); color: white; }
    </style>
</head>
<body>
    <div class="theme-switch" onclick="toggleTheme()" title="Сменить тему">🌓</div>
    <div class="container">
        <h1>Скачать видео</h1>
        <form id="downloadForm" action="/analyze" method="post">
            <input type="text" name="url" placeholder="Вставьте ссылку на видео..." required>
            <br>
            <button type="submit" id="submitBtn">Проверить качество</button>
        </form>
        <div id="loader-container">
            <div class="spinner"></div>
            <span id="progress-text">Анализ видео: 0%</span>
            <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
        </div>
        <div class="platforms-section">
            <p>Поддерживаемые платформы:</p>
            <div class="category"><span class="category-title">СНГ Сервисы</span><div class="tags"><span class="tag">VK</span><span class="tag">Rutube</span><span class="tag">Дзен</span><span class="tag">OK.ru</span></div></div>
            <div class="category"><span class="category-title">Мировые соцсети</span><div class="tags"><span class="tag">YouTube</span><span class="tag">TikTok</span><span class="tag">Instagram</span><span class="tag">Facebook</span><span class="tag">Twitter (X)</span></div></div>
            <div class="category"><span class="category-title">Видеохостинги</span><div class="tags"><span class="tag">Vimeo</span><span class="tag">DailyMotion</span><span class="tag">Twitch</span></div></div>
        </div>
    </div>
    <script>
        function toggleTheme() {
            const body = document.body;
            const currentTheme = body.getAttribute('data-theme');
            body.setAttribute('data-theme', currentTheme === 'dark' ? 'light' : 'dark');
        }
        const form = document.getElementById('downloadForm');
        const btn = document.getElementById('submitBtn');
        const loaderContainer = document.getElementById('loader-container');
        const progressFill = document.getElementById('progress-fill');
        const progressText = document.getElementById('progress-text');
        form.onsubmit = function() {
            btn.style.display = 'none';
            loaderContainer.style.display = 'block';
            let width = 0;
            const interval = setInterval(() => {
                if (width >= 95) { clearInterval(interval); } 
                else {
                    width += Math.random() * 5;
                    if (width > 95) width = 95;
                    progressFill.style.width = width + '%';
                    progressText.innerText = `Анализ видео: ${Math.round(width)}%`;
                }
            }, 100);
        };
    </script>
</body>
</html>
