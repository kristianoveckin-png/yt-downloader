<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Выбор качества</title>
    <link rel="shortcut icon" href="/favicon.ico" type="image/png">
    <style>
        :root {
            --bg-color: #f0f2f5;
            --container-bg: #ffffff;
            --text-color: #333333;
            --input-border: #ddd;
            --accent-color: #28a745;
            --accent-hover: #218838;
            --share-color: #007bff;
            --share-hover: #0056b3;
        }

        [data-theme="dark"] {
            --bg-color: #18191a;
            --container-bg: #242526;
            --text-color: #e4e6eb;
            --input-border: #3a3b3c;
            --accent-color: #34d058;
            --accent-hover: #2eb84d;
        }

        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; background-color: var(--bg-color); color: var(--text-color); margin: 0; transition: background 0.3s; padding: 20px; box-sizing: border-box; }
        .container { text-align: center; background: var(--container-bg); padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); width: 100%; max-width: 600px; transition: background 0.3s; box-sizing: border-box; }
        h2 { color: var(--text-color); margin-bottom: 10px; font-size: clamp(20px, 5vw, 24px); }
        .video-title { color: #888; font-size: 14px; margin-bottom: 25px; font-style: italic; word-wrap: break-word; }
        
        /* Секция QR и Поделиться */
        .share-section { display: flex; justify-content: space-around; align-items: center; background: var(--platform-bg, #f8f8f8); padding: 15px; border-radius: 15px; margin-bottom: 25px; border: 1px solid var(--input-border); }
        .qr-code { width: 80px; height: 80px; border: 2px solid white; border-radius: 5px; }
        .share-btn { padding: 10px 15px; background: var(--share-color); color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 14px; transition: 0.3s; }
        .share-btn:hover { background: var(--share-hover); transform: scale(1.05); }

        .table-wrapper { overflow-x: auto; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; min-width: 300px; }
        th, td { padding: 12px; border-bottom: 1px solid var(--input-border); text-align: left; }
        th { background-color: var(--platform-bg, #f8f8f8); color: var(--text-color); }
        .btn-download { padding: 8px 15px; background: var(--accent-color); color: white; border: none; border-radius: 5px; cursor: pointer; transition: all 0.3s; font-size: 14px; font-weight: bold; }
        .btn-download:hover { background: var(--accent-hover); transform: scale(1.05); }
        .btn-back { display: inline-block; margin-top: 20px; text-decoration: none; color: #888; font-size: 14px; transition: 0.3s; }
        .btn-back:hover { color: var(--text-color); }
    </style>
</head>
<body>
    <div class="container">
        <h2>Выберите качество</h2>
        <div class="video-title">{{ title }}</div>
        
        <!-- СЕКЦИЯ QR И ПОДЕЛИТЬСЯ -->
        <div class="share-section">
            <div style="text-align: left;">
                <span style="font-size: 12px; color: #888; display: block; margin-bottom: 5px;">Скачать на телефон:</span>
                <img class="qr-code" src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data={{ url }}" alt="QR Code">
            </div>
            <button class="share-btn" onclick="copyLink()">🔗 Поделиться ссылкой</button>
        </div>

        <form action="/download" method="post" id="downloadForm">
            <input type="hidden" name="url" value="{{ url }}">
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr><th>Качество</th><th>Формат</th><th>Действие</th></tr>
                    </thead>
                    <tbody>
                        {% for f in formats %}
                        <tr>
                            <td>{{ f.resolution }}</td>
                            <td>{{ f.ext }}</td>
                            <td><button type="submit" name="format_id" value="{{ f.format_id }}" class="btn-download">Скачать</button></td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </form>
        <a href="/" class="btn-back">← Вернуться назад</a>
    </div>

    <script>
        function copyLink() {
            const url = "{{ url }}";
            navigator.clipboard.writeText(url).then(() => {
                alert("Ссылка скопирована в буфер обмена!");
            }).catch(err => {
                alert("Ошибка при копировании: " + err);
            });
        }
    </script>
</body>
</html>
