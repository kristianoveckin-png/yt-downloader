<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Выбор качества</title>
    <link rel="shortcut icon" href="/favicon.ico" type="image/png">
    <style>
        :root {
            --bg-color: #f0f2f5; --container-bg: #ffffff; --text-color: #333333;
            --input-border: #ddd; --accent-color: #28a745; --accent-hover: #218838;
            --share-color: #007bff; --share-hover: #0056b3; --audio-color: #1db954;
        }
        [data-theme="dark"] {
            --bg-color: #18191a; --container-bg: #242526; --text-color: #e4e6eb;
            --input-border: #3a3b3c; --accent-color: #34d058; --accent-hover: #2eb84d;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; transition: all 0.5s ease;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: var(--text-color);
        }
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .container { 
            text-align: center; 
            background: var(--glass-bg, rgba(255,255,255,0.7)); 
            backdrop-filter: blur(15px); 
            -webkit-backdrop-filter: blur(15px);
            padding: 30px; 
            border-radius: 30px; 
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 20px 40px rgba(0,0,0,0.2); 
            width: 100%; max-width: 600px; 
            animation: fadeInUp 0.8s ease-out;
            box-sizing: border-box;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        h2 { color: var(--text-color); margin-bottom: 10px; font-size: clamp(20px, 5vw, 24px); }
        .video-title { color: #888; font-size: 14px; margin-bottom: 25px; font-style: italic; word-wrap: break-word; }
        .share-section { display: flex; justify-content: space-around; align-items: center; background: rgba(0,0,0,0.05); padding: 15px; border-radius: 15px; margin-bottom: 25px; border: 1px solid var(--input-border); }
        .qr-code { width: 80px; height: 80px; border: 2px solid white; border-radius: 5px; box-shadow: 0 5px 10px rgba(0,0,0,0.1); }
        .share-btn { padding: 10px 15px; background: var(--share-color); color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 14px; transition: 0.3s; }
        .share-btn:hover { background: var(--share-hover); transform: scale(1.05); }
        .audio-section { background: rgba(40, 167, 69, 0.1); padding: 15px; border-radius: 15px; margin-bottom: 20px; border: 1px solid rgba(40, 167, 69, 0.3); }
        .btn-audio { padding: 12px 20px; background: var(--audio-color); color: white; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; transition: 0.3s; width: 100%; }
        .btn-audio:hover { transform: scale(1.02); background: #1aa34a; box-shadow: 0 5px 15px rgba(29, 185, 84, 0.4); }
        .table-wrapper { overflow-x: auto; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; min-width: 300px; }
        th, td { padding: 12px; border-bottom: 1px solid var(--input-border); text-align: left; }
        th { background-color: rgba(0,0,0,0.05); color: var(--text-color); }
        .btn-download { padding: 8px 15px; background: var(--accent-color); color: white; border: none; border-radius: 8px; cursor: pointer; transition: all 0.3s; font-size: 14px; font-weight: bold; }
        .btn-download:hover { background: var(--accent-hover); transform: scale(1.05); }
        .btn-back { display: inline-block; margin-top: 20px; text-decoration: none; color: #888; font-size: 14px; transition: 0.3s; }
        .btn-back:hover { color: var(--text-color); }
        #download-loader { display: none; margin: 20px auto; text-align: center; }
        .spinner { border: 4px solid rgba(0,0,0,0.1); border-top: 4px solid var(--accent-color); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto 10px; }
        .progress-bar { width: 100%; background: rgba(0,0,0,0.1); height: 12px; border-radius: 10px; overflow: hidden; margin-top: 10px; }
        .progress-fill { width: 0%; height: 100%; background: var(--accent-color); transition: width 0.2s; box-shadow: 0 0 10px var(--accent-color); }
        #progress-text { font-size: 14px; color: var(--text-color); margin-top: 5px; display: block; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body data-theme="light">
    <div class="container">
        <h2 id="page-title">Выберите формат</h2>
        <div class="video-title" id="video-title">{{ title }}</div>
        <div id="download-loader">
            <div class="spinner"></div>
            <span id="progress-text">Загрузка на сервер: 0%</span>
            <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
        </div>
        <div class="share-section">
            <div style="text-align: left;">
                <span style="font-size: 12px; color: #888; display: block; margin-bottom: 5px;">Скачать на телефон:</span>
                <img class="qr-code" src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://yt-downloader-14zn.onrender.com/analyze?url={{ url }}" alt="QR Code">
            </div>
            <button class="share-btn" onclick="copyLink()">🔗 Поделиться ссылкой</button>
        </div>
        <div class="audio-section">
            <form action="/download_audio_raw" method="post">
                <input type="hidden" name="url" value="{{ url }}">
                <button type="submit" class="btn-audio">🎵 Скачать аудио (Оригинал)</button>
            </form>
        </div>
        <form action="/download" method="post" id="downloadForm">
            <input type="hidden" name="url" value="{{ url }}">
            <div class="table-wrapper">
                <table>
                    <thead><tr><th>Качество</th><th>Формат</th><th>Действие</th></tr></thead>
                    <tbody>
                        {% for f in formats %}
                        <tr>
                            <td>{{ f.resolution }}</td>
                            <td>{{ f.ext }}</td>
                            <td><button type="submit" name="format_id" value="{{ f.format_id }}" class="btn-download">Скачать</button></td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </form>
        <a href="/" class="btn-back">← Вернуться назад</a>
    </div>

    <script>
        function copyLink() {
            const siteUrl = "https://yt-downloader-14zn.onrender.com/analyze?url={{ url }}";
            navigator.clipboard.writeText(siteUrl).then(() => {
                alert("Ссылка на скачивание скопирована!");
            });
        }
        const form = document.getElementById('downloadForm');
        const loader = document.getElementById('download-loader');
        const progressFill = document.getElementById('progress-fill');
        const progressText = document.getElementById('progress-text');
        const pageTitle = document.getElementById('page-title');
        const videoTitle = document.getElementById('video-title');
        form.onsubmit = function() {
            form.style.display = 'none';
            pageTitle.style.display = 'none';
            videoTitle.style.display = 'none';
            loader.style.display = 'block';
            let width = 0;
            const interval = setInterval(() => {
                if (width >= 98) { clearInterval(interval); } 
                else {
                    width += Math.random() * 3;
                    if (width > 98) width = 98;
                    progressFill.style.width = width + '%';
                    progressText.innerText = `Загрузка на сервер: ${Math.round(width)}%`;
                }
            }, 150);
            setTimeout(() => {
                loader.style.display = 'none';
                form.style.display = 'block';
                pageTitle.style.display = 'block';
                videoTitle.style.display = 'block';
                progressFill.style.width = '0%';
                progressText.innerText = 'Загрузка на сервер: 0%';
            }, 7000); 
        };
    </script>
</body>
</html>
